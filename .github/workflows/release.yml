name: Release

# Cut a release by pushing a version tag:  git tag v1.2.3 && git push origin v1.2.3
# The binaries are built here, in a clean auditable runner — not on a laptop — and
# each carries a signed SLSA build-provenance attestation linking it to this exact
# commit + workflow run. Verify a downloaded binary with:
#   gh attestation verify tabbrew-<os>-<arch> --repo colevels/tabbrew-cli
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release + upload assets
  id-token: write # OIDC token the attestation signs with (Sigstore)
  attestations: write # record the build-provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5 # pinned for reproducible builds (keep in sync with ci.yml)

      - run: bun install --frozen-lockfile
      - run: bun run typecheck

      # Bun cross-compiles every target from this one runner — no OS matrix needed.
      - name: Build binaries
        run: |
          mkdir -p dist
          for t in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            bun build src/index.ts --compile --target=bun-$t --outfile dist/tabbrew-$t
          done

      - name: Generate checksums
        working-directory: dist
        run: shasum -a 256 tabbrew-darwin-arm64 tabbrew-darwin-x64 tabbrew-linux-arm64 tabbrew-linux-x64 > checksums.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/tabbrew-darwin-arm64
            dist/tabbrew-darwin-x64
            dist/tabbrew-linux-arm64
            dist/tabbrew-linux-x64

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/tabbrew-darwin-arm64 \
            dist/tabbrew-darwin-x64 \
            dist/tabbrew-linux-arm64 \
            dist/tabbrew-linux-x64 \
            dist/checksums.txt
